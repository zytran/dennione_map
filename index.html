<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Interactive Continent Map with Zoomable City</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin:0; padding:0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
 
  const map = L.map('map', {
    crs: L.CRS.Simple, 
    minZoom: -2,
    maxZoom: 4
  });


  const mapWidth = 2250;  // your map width
  const mapHeight = 7000; // your map height
  const mapBounds = [[0,0], [mapHeight, mapWidth]];

  
  L.imageOverlay('map.png', mapBounds).addTo(map);
  map.fitBounds(mapBounds);

 
  const cityBounds = [
    [967, 1570],   // top left corner of city on map (y,x)
    [1178, 1758]  // bottom right corner of city on map (y,x)
  ];
  const cityOverlay = L.imageOverlay('tilted.jpeg', cityBounds);

 
  map.on('zoomend', function() {
    if (map.getZoom() >= 2) {
      if (!map.hasLayer(cityOverlay)) {
        map.addLayer(cityOverlay);
      }
    } else {
      if (map.hasLayer(cityOverlay)) {
        map.removeLayer(cityOverlay);
      }
    }
  });

  
  const cityCenterCoords = [
    (cityBounds[0][0] + cityBounds[1][0]) / 2,
    (cityBounds[0][1] + cityBounds[1][1]) / 2
  ];

  const cityMarker = L.marker(cityCenterCoords).addTo(map);
  
  cityMarker.bindPopup("<b>Tilted Towers</b><br>Triggered trash kids then their salt is increased.</br>");

</script>

</body>
</html>
